# Configuration for Supabase project

[project]
name = "completion-2.0"
description = "Ride booking and calling platform"

[functions]
verify_jwt = true

[functions.generateAgoraToken]
verify_jwt = false  # No requiere autenticación para generar token
main = "generateAgoraToken/index.ts"
import_map = "./functions/import_map.json"

[functions.notifyIncomingCall]
verify_jwt = true  # Requiere autenticación
main = "notifyIncomingCall/index.ts"
import_map = "./functions/import_map.json"
